name: Auto-Update ADR Premium Data

on:
  schedule:
    # Run every 15 minutes (UTC time)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub Actions interface

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Gives write access to commit changes back to main branch

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run data fetcher
      run: python data_fetcher.py

    - name: Commit and push updated files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data.json data.js
        git commit -m "Auto-update pricing data [skip ci]" || echo "No changes to commit"
        git push
